<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lisa & Eric</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#141414',
                        card: '#1a1a1a',
                        border: '#2a2a2a',
                        muted: '#666666',
                        fg: '#e0e0e0',
                        accent: '#c9a96e',
                        rose: '#b88a8a',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
        }
        body.locked { overflow: hidden; }

        /* Login Gate */
        .login-gate {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .login-gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-box {
            width: 320px;
            text-align: center;
        }
        .login-input {
            width: 200px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #2a2a2a;
            color: #e0e0e0;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            padding: 0.75rem 0;
            text-align: center;
            letter-spacing: 12px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
        }
        .login-input:focus { border-color: #c9a96e; }
        .login-input::placeholder { color: #333; letter-spacing: 12px; }
        .login-btn {
            display: block;
            margin: 1.5rem auto 0;
            padding: 0.6rem 2.5rem;
            background: transparent;
            border: 1px solid #c9a96e;
            color: #c9a96e;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover, .login-btn:active {
            background: #c9a96e;
            color: #0a0a0a;
        }
        .login-error {
            color: #8a4a4a;
            font-size: 0.75rem;
            margin-top: 1rem;
            min-height: 1.2em;
            transition: opacity 0.3s;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .font-display { font-family: 'ZCOOL XiaoWei', serif; }

        /* Navigation */
        .nav-glass {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
        }
        .nav-link {
            position: relative;
            color: #666;
            transition: color 0.3s;
            letter-spacing: 2px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .nav-link:hover, .nav-link.active { color: #c9a96e; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            width: 0;
            height: 1px;
            background: #c9a96e;
            transition: all 0.3s;
            transform: translateX(-50%);
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        /* Hitokoto */
        .hitokoto-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .hitokoto-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease;
            filter: brightness(0.15) saturate(0.6);
        }
        .hitokoto-slide.active { opacity: 1; }
        .hitokoto-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.8) 100%);
        }
        .hitokoto-content {
            position: relative;
            z-index: 10;
            max-width: 700px;
            padding: 0 2rem;
            text-align: center;
        }
        .hitokoto-text {
            font-size: 1.5rem;
            line-height: 2.2;
            letter-spacing: 3px;
            color: rgba(224, 224, 224, 0.9);
            font-weight: 200;
            transition: opacity 0.8s ease;
        }
        .hitokoto-from {
            margin-top: 2rem;
            color: #c9a96e;
            font-size: 0.875rem;
            letter-spacing: 4px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .hitokoto-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 2.5rem;
        }
        .hitokoto-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            transition: all 0.3s;
        }
        .hitokoto-dot.active {
            background: #c9a96e;
            box-shadow: 0 0 8px rgba(201, 169, 110, 0.5);
        }

        /* Divider */
        .section-divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a96e, transparent);
            margin: 0 auto;
        }

        /* Countdown */
        .countdown-box {
            background: rgba(201, 169, 110, 0.05);
            border: 1px solid rgba(201, 169, 110, 0.1);
            border-radius: 2px;
            padding: 1.5rem 1rem;
            text-align: center;
            min-width: 90px;
        }
        .countdown-num {
            font-size: 2.5rem;
            font-weight: 200;
            color: #c9a96e;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .countdown-label {
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 3px;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        /* Timeline */
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, #2a2a2a 10%, #2a2a2a 90%, transparent);
        }
        .timeline-item {
            position: relative;
            width: 50%;
            padding: 0 3rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .timeline-item.left { left: 0; text-align: right; }
        .timeline-item.right { left: 50%; text-align: left; }
        .timeline-dot {
            position: absolute;
            top: 1.5rem;
            width: 8px;
            height: 8px;
            background: #0a0a0a;
            border: 1px solid #c9a96e;
            border-radius: 50%;
            z-index: 2;
        }
        .timeline-item.left .timeline-dot { right: -4px; }
        .timeline-item.right .timeline-dot { left: -4px; }
        .timeline-card {
            background: #141414;
            border: 1px solid #1f1f1f;
            border-radius: 2px;
            padding: 1.5rem;
            transition: border-color 0.3s;
        }
        .timeline-card:hover { border-color: rgba(201, 169, 110, 0.3); }
        .timeline-card.highlight { border-color: rgba(201, 169, 110, 0.3); }
        .timeline-date {
            font-size: 0.7rem;
            color: #c9a96e;
            letter-spacing: 2px;
        }
        @media (max-width: 768px) {
            .timeline-line { left: 1rem; }
            .timeline-item { width: 100%; left: 0 !important; padding-left: 3rem; padding-right: 0; text-align: left; }
            .timeline-dot { left: calc(1rem - 4px) !important; right: auto !important; }
        }

        /* Memories */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }
        @media (max-width: 768px) {
            .memory-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .memory-item {
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            cursor: pointer;
            aspect-ratio: 4/3;
        }
        .memory-item.span-tall {
            grid-row: span 2;
            aspect-ratio: auto;
        }
        .memory-item.span-wide {
            grid-column: span 2;
        }
        @media (max-width: 768px) {
            .memory-item.span-wide { grid-column: span 2; }
        }
        .memory-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6) saturate(0.7);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .memory-item:hover img {
            filter: brightness(0.4) saturate(0.5);
            transform: scale(1.05);
        }
        .memory-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .memory-item:hover .memory-overlay { opacity: 1; }

        /* Memory Detail Modal */
        .memory-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow-y: auto;
        }
        .memory-modal.active { display: block; }
        .memory-modal-close {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            color: #666;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.3s;
            background: none;
            border: none;
        }
        .memory-modal-close:hover { color: #c9a96e; }
        .memory-modal-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 6rem 2rem 4rem;
        }
        .memory-modal-img {
            width: 100%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 2px;
            margin-bottom: 2rem;
        }

        /* Map */
        .map-container {
            height: 450px;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
        }
        .leaflet-tile-pane { filter: brightness(0.6) saturate(0.3) contrast(1.1); }
        .leaflet-control-zoom a {
            background: #1a1a1a !important;
            color: #999 !important;
            border-color: #2a2a2a !important;
        }

        /* Music - APlayer overrides */
        .aplayer {
            background: #141414 !important;
            border: 1px solid #1f1f1f !important;
            border-radius: 2px !important;
            box-shadow: none !important;
            margin-bottom: 0.5rem !important;
            font-family: 'Noto Serif SC', serif !important;
        }
        .aplayer .aplayer-body {
            background: #141414 !important;
        }
        .aplayer .aplayer-pic {
            filter: brightness(0.8) saturate(0.7);
        }
        .aplayer .aplayer-info {
            border-top-color: #1f1f1f !important;
        }
        .aplayer .aplayer-info .aplayer-music .aplayer-title {
            color: #e0e0e0 !important;
        }
        .aplayer .aplayer-info .aplayer-music .aplayer-author {
            color: #666 !important;
        }
        .aplayer .aplayer-info .aplayer-controller .aplayer-bar-wrap .aplayer-bar {
            background: #1f1f1f !important;
            border-radius: 1px !important;
        }
        .aplayer .aplayer-info .aplayer-controller .aplayer-bar-wrap .aplayer-bar .aplayer-loaded {
            background: #2a2a2a !important;
        }
        .aplayer .aplayer-info .aplayer-controller .aplayer-bar-wrap .aplayer-bar .aplayer-played {
            background: #c9a96e !important;
        }
        .aplayer .aplayer-info .aplayer-controller .aplayer-bar-wrap .aplayer-bar .aplayer-played .aplayer-thumb {
            background: #c9a96e !important;
            border: 1px solid #c9a96e !important;
        }
        .aplayer .aplayer-info .aplayer-controller .aplayer-time {
            color: #666 !important;
        }
        .aplayer .aplayer-icon {
            fill: #666 !important;
        }
        .aplayer .aplayer-icon:hover {
            fill: #c9a96e !important;
        }
        .aplayer .aplayer-lrc {
            color: #999 !important;
        }
        .aplayer .aplayer-lrc p.aplayer-lrc-current {
            color: #c9a96e !important;
        }
        .aplayer .aplayer-list {
            background: #141414 !important;
            border-top: 1px solid #1f1f1f !important;
        }
        .aplayer .aplayer-list ol li {
            border-top: 1px solid #1a1a1a !important;
            color: #666 !important;
        }
        .aplayer .aplayer-list ol li:hover {
            background: #1a1a1a !important;
        }
        .aplayer .aplayer-list ol li.aplayer-list-light {
            background: #1a1a1a !important;
            color: #c9a96e !important;
        }
        .aplayer .aplayer-list ol li .aplayer-list-index {
            color: #333 !important;
        }
        .aplayer .aplayer-list ol li.aplayer-list-light .aplayer-list-index {
            color: #c9a96e !important;
        }

        /* Scroll Animations */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body class="locked">

    <!-- Login Gate -->
    <div class="login-gate" id="login-gate">
        <div class="login-box">
            <p class="font-display text-accent tracking-[6px] text-sm mb-2">LISA & ERIC</p>
            <div style="width:40px;height:1px;background:linear-gradient(90deg,transparent,#c9a96e,transparent);margin:1.5rem auto"></div>
            <p class="text-muted text-xs tracking-[3px] mb-8">请输入访问密码</p>
            <input type="password" id="login-pwd" placeholder="------" autocomplete="off" maxlength="6" inputmode="numeric" class="login-input">
            <button id="login-btn" class="login-btn">进 入</button>
            <p class="login-error" id="login-error"></p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-glass fixed top-0 left-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="font-display text-accent text-lg tracking-widest">L & E</a>
            <div class="hidden md:flex items-center gap-8">
                <a href="#hero" class="nav-link active">序</a>
                <a href="#countdown" class="nav-link">时光</a>
                <a href="#timeline" class="nav-link">纪年</a>
                <a href="#memories" class="nav-link">拾光</a>
                <a href="#map" class="nav-link">行迹</a>
                <a href="#music" class="nav-link">听风</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-muted"><i class="fa fa-bars"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t border-border">
            <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col gap-4">
                <a href="#hero" class="nav-link active">序</a>
                <a href="#countdown" class="nav-link">时光</a>
                <a href="#timeline" class="nav-link">纪年</a>
                <a href="#memories" class="nav-link">拾光</a>
                <a href="#map" class="nav-link">行迹</a>
                <a href="#music" class="nav-link">听风</a>
            </div>
        </div>
    </nav>

    <!-- Section 1: Hitokoto -->
    <section id="hero" class="hitokoto-section">
        <div id="hitokoto-bg-container"></div>
        <div class="hitokoto-overlay"></div>
        <div class="hitokoto-content">
            <div style="margin-bottom: 2rem;">
                <span class="font-display text-accent tracking-[8px] text-sm">LISA & ERIC</span>
            </div>
            <p id="hitokoto-text" class="hitokoto-text"></p>
            <p id="hitokoto-from" class="hitokoto-from"></p>
            <div class="hitokoto-dots" id="hitokoto-dots"></div>
        </div>
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 text-muted animate-bounce">
            <i class="fa fa-angle-down text-xl"></i>
        </div>
    </section>

    <!-- Section 2: Countdown -->
    <section id="countdown" class="py-32 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <div class="reveal">
                <p class="text-muted text-xs tracking-[6px] uppercase mb-4">LOVE STARTED</p>
                <div class="section-divider mb-10"></div>
                <p class="text-fg font-display text-3xl mb-2">我们已相伴</p>
                <p class="text-accent font-display text-6xl mb-2" id="love-days">0</p>
                <p class="text-muted text-sm tracking-[4px] mb-12">天</p>
            </div>
            <div class="reveal flex justify-center gap-6 flex-wrap" style="transition-delay: 0.2s">
                <div class="countdown-box">
                    <div class="countdown-num" id="cd-days">00</div>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-box">
                    <div class="countdown-num" id="cd-hours">00</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-box">
                    <div class="countdown-num" id="cd-minutes">00</div>
                    <div class="countdown-label">Mins</div>
                </div>
                <div class="countdown-box">
                    <div class="countdown-num" id="cd-seconds">00</div>
                    <div class="countdown-label">Secs</div>
                </div>
            </div>
            <div class="reveal mt-12 text-muted text-xs tracking-[4px]" style="transition-delay: 0.4s">
                <span>2019.05.06 相识</span>
                <span class="mx-4 text-border">|</span>
                <span>2023.07.16 在一起</span>
            </div>
        </div>
    </section>

    <!-- Section 3: Timeline -->
    <section id="timeline" class="py-32 px-6">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-20 reveal">
                <p class="text-muted text-xs tracking-[6px] uppercase mb-4">OUR TIMELINE</p>
                <div class="section-divider mb-6"></div>
                <h2 class="font-display text-3xl text-fg tracking-[4px]">爱情纪年</h2>
            </div>
            <div class="relative" id="timeline-container">
                <div class="timeline-line hidden md:block"></div>
            </div>
        </div>
    </section>

    <!-- Section 4: Memories -->
    <section id="memories" class="py-32 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-20 reveal">
                <p class="text-muted text-xs tracking-[6px] uppercase mb-4">GALLERY</p>
                <div class="section-divider mb-6"></div>
                <h2 class="font-display text-3xl text-fg tracking-[4px]">拾光</h2>
            </div>
            <div class="memory-grid" id="memories-grid"></div>
        </div>
    </section>

    <!-- Memory Detail Modal -->
    <div class="memory-modal" id="memory-modal">
        <button class="memory-modal-close" id="memory-modal-close">&times;</button>
        <div class="memory-modal-inner">
            <img id="modal-img" class="memory-modal-img" src="" alt="">
            <p id="modal-date" class="text-xs text-accent tracking-wider mb-2"></p>
            <h3 id="modal-title" class="font-display text-2xl text-fg mb-2"></h3>
            <p id="modal-location" class="text-xs text-muted tracking-wider mb-4"></p>
            <p id="modal-text" class="text-muted leading-relaxed"></p>
        </div>
    </div>

    <!-- Section 5: Map -->
    <section id="map" class="py-32 px-6">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-20 reveal">
                <p class="text-muted text-xs tracking-[6px] uppercase mb-4">FOOTPRINTS</p>
                <div class="section-divider mb-6"></div>
                <h2 class="font-display text-3xl text-fg tracking-[4px]">行迹</h2>
            </div>
            <div class="map-container reveal">
                <div id="travel-map" style="height: 100%; width: 100%;"></div>
            </div>
            <div class="grid grid-cols-3 gap-4 mt-8 reveal" style="transition-delay: 0.2s">
                <div class="text-center py-6 border border-border rounded-sm">
                    <p class="font-display text-2xl text-accent" id="stat-cities">0</p>
                    <p class="text-muted text-xs tracking-wider mt-1">座城市</p>
                </div>
                <div class="text-center py-6 border border-border rounded-sm">
                    <p class="font-display text-2xl text-accent" id="stat-trips">0</p>
                    <p class="text-muted text-xs tracking-wider mt-1">次旅行</p>
                </div>
                <div class="text-center py-6 border border-border rounded-sm">
                    <p class="font-display text-2xl text-accent" id="stat-days">0</p>
                    <p class="text-muted text-xs tracking-wider mt-1">天在路上</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Section 6: Music -->
    <section id="music" class="py-32 px-6">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-20 reveal">
                <p class="text-muted text-xs tracking-[6px] uppercase mb-4">PLAYLIST</p>
                <div class="section-divider mb-6"></div>
                <h2 class="font-display text-3xl text-fg tracking-[4px]">听风</h2>
            </div>
            <div class="reveal" id="music-player"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-border py-16 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <p class="font-display text-accent tracking-[6px] mb-4">LISA & ERIC</p>
            <p class="text-muted text-xs tracking-wider">用爱创造，用心记录</p>
            <p class="text-border text-xs mt-8">&copy; 2025</p>
        </div>
    </footer>

    <script>
        const DATA_BASE = './data/';
        const dataCache = {};

        async function loadData(name) {
            if (dataCache[name]) return dataCache[name];
            const resp = await fetch(DATA_BASE + name + '.json');
            const data = await resp.json();
            dataCache[name] = data;
            return data;
        }

        // ========== Hitokoto ==========
        async function initHitokoto() {
            const data = await loadData('hitokoto');
            const bgContainer = document.getElementById('hitokoto-bg-container');
            const dotsContainer = document.getElementById('hitokoto-dots');
            let current = 0;

            data.forEach((item, i) => {
                const slide = document.createElement('div');
                slide.className = 'hitokoto-slide' + (i === 0 ? ' active' : '');
                slide.style.backgroundImage = 'url(' + item.image + ')';
                bgContainer.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'hitokoto-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => show(i));
                dotsContainer.appendChild(dot);
            });

            function show(index) {
                current = index;
                const textEl = document.getElementById('hitokoto-text');
                const fromEl = document.getElementById('hitokoto-from');
                const slides = bgContainer.querySelectorAll('.hitokoto-slide');
                const dots = dotsContainer.querySelectorAll('.hitokoto-dot');

                textEl.style.opacity = '0';
                fromEl.style.opacity = '0';
                slides.forEach((s, i) => s.classList.toggle('active', i === index));
                dots.forEach((d, i) => d.classList.toggle('active', i === index));

                setTimeout(() => {
                    textEl.textContent = data[index].text;
                    fromEl.textContent = '\u2014\u2014 ' + data[index].from;
                    textEl.style.opacity = '1';
                    fromEl.style.opacity = '0.7';
                }, 400);
            }

            show(0);
            setInterval(() => show((current + 1) % data.length), 8000);
        }

        // ========== Timeline ==========
        async function initTimeline() {
            const data = await loadData('timeline');
            const container = document.getElementById('timeline-container');

            data.forEach((item, i) => {
                const side = i % 2 === 0 ? 'left' : 'right';
                const div = document.createElement('div');
                div.className = 'timeline-item ' + side;
                div.setAttribute('data-reveal', '');
                div.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="timeline-card${item.highlight ? ' highlight' : ''}">
                        <p class="timeline-date mb-2">${item.date}</p>
                        <h3 class="text-fg text-lg font-display mb-2${item.highlight ? ' text-accent' : ''}">${item.title}</h3>
                        <p class="text-muted text-sm leading-relaxed">${item.text}</p>
                    </div>
                `;
                container.appendChild(div);
            });

            initRevealObserver();
        }

        // ========== Memories ==========
        async function initMemories() {
            const data = await loadData('memories');
            const grid = document.getElementById('memories-grid');

            data.forEach((item, i) => {
                const div = document.createElement('div');
                let cls = 'memory-item reveal';
                if (item.style === 'tall') cls += ' span-tall';
                if (item.style === 'wide') cls += ' span-wide';
                div.className = cls;
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.title}" loading="lazy">
                    <div class="memory-overlay">
                        <p class="text-xs text-accent tracking-wider">${item.date}</p>
                        <p class="text-fg font-display mt-1">${item.title}</p>
                        <p class="text-muted text-xs mt-1 line-clamp-2">${item.text}</p>
                    </div>
                `;
                div.addEventListener('click', () => openMemoryModal(item));
                grid.appendChild(div);
            });

            initRevealObserver();
        }

        function openMemoryModal(item) {
            document.getElementById('modal-img').src = item.image;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').textContent = item.date;
            document.getElementById('modal-location').textContent = item.location || '';
            document.getElementById('modal-text').textContent = item.text;
            document.getElementById('memory-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('memory-modal-close').addEventListener('click', closeMemoryModal);
        document.getElementById('memory-modal').addEventListener('click', function (e) {
            if (e.target === this) closeMemoryModal();
        });
        function closeMemoryModal() {
            document.getElementById('memory-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ========== Map ==========
        async function initMap() {
            const locations = await loadData('locations');
            document.getElementById('stat-cities').textContent = locations.length;
            document.getElementById('stat-trips').textContent = Math.ceil(locations.length * 0.8);
            document.getElementById('stat-days').textContent = locations.length * 2 - 5;

            const map = L.map('travel-map', { zoomControl: true }).setView([30, 110], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                maxZoom: 18
            }).addTo(map);

            const icon = L.divIcon({
                className: '',
                html: '<div style="width:8px;height:8px;background:#c9a96e;border-radius:50%;box-shadow:0 0 6px rgba(201,169,110,0.6)"></div>',
                iconSize: [8, 8],
                iconAnchor: [4, 4]
            });

            const latlngs = [];
            locations.forEach(loc => {
                latlngs.push([loc.lat, loc.lng]);
                L.marker([loc.lat, loc.lng], { icon })
                    .addTo(map)
                    .bindPopup('<div style="font-family:serif;color:#333;font-size:13px"><strong>' + loc.name + '</strong></div>');
            });

            L.polyline(latlngs, { color: '#c9a96e', weight: 1, opacity: 0.4, dashArray: '5,10' }).addTo(map);
        }

        let ap = null;

        // ========== Music ==========
        const PLAYLIST_ID = '2210719803';
        const PLAYLIST_MAX = 80;
        async function fetchPlaylist() {
            const apiUrl = 'https://music.163.com/api/v6/playlist/detail?id=' + PLAYLIST_ID + '&n=100000';
            const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
            const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
            const data = await resp.json();
            return (data.playlist && data.playlist.tracks) || [];
        }

        async function initMusic() {
            const container = document.getElementById('music-player');
            const audioList = [];
            let tracks = [];

            try {
                tracks = await fetchPlaylist();
            } catch (e) {
                try {
                    const fallback = await loadData('music');
                    tracks = fallback.map(item => ({ id: item.netease_id, name: item.name, artists: [{ name: item.artist }] }));
                } catch (e2) {}
            }

            const list = tracks.slice(0, PLAYLIST_MAX);
            for (const t of list) {
                const artists = (t.artists || []).map(a => a.name).join(' / ');
                audioList.push({
                    name: t.name,
                    artist: artists,
                    url: 'https://music.163.com/song/media/outer/url?id=' + t.id + '.mp3',
                    theme: '#c9a96e'
                });
            }

            if (audioList.length === 0) {
                audioList.push({ name: '暂无歌曲', artist: '', url: '', theme: '#c9a96e' });
            }

            ap = new APlayer({
                container: container,
                theme: '#c9a96e',
                autoplay: false,
                order: 'list',
                loop: 'all',
                volume: 0.7,
                mutex: true,
                listFolded: true,
                listMaxHeight: '300px',
                audio: audioList
            });

            initRevealObserver();
        }

        // ========== Countdown ==========
        function updateCountdown() {
            const start = new Date('2023-07-16T00:00:00').getTime();
            const now = Date.now();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('love-days').textContent = d;
            document.getElementById('cd-days').textContent = String(d).padStart(2, '0');
            document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
            document.getElementById('cd-minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('cd-seconds').textContent = String(s).padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // ========== Scroll Reveal ==========
        function initRevealObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.reveal, [data-reveal]').forEach(el => {
                if (!el.classList.contains('visible')) observer.observe(el);
            });
        }

        // ========== Nav ==========
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function () {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('mobile-menu').classList.add('hidden');
            });
        });
        document.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', function (e) {
                e.preventDefault();
                const t = document.querySelector(this.getAttribute('href'));
                if (t) window.scrollTo({ top: t.offsetTop - 60, behavior: 'smooth' });
            });
        });

        // ========== Login Gate ==========
        const LOGIN_KEY = 'le_auth';
        const PWD_HASH = '432b8b3e6e2f9eb0e4f3e83d5b8e7c1f8a2d4b6e0f1a3c5d7e9f0b2d4a6c8e0f';

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function unlock() {
            document.getElementById('login-gate').classList.add('hidden');
            document.body.classList.remove('locked');
            sessionStorage.setItem(LOGIN_KEY, '1');
            setTimeout(() => { if (ap) ap.play(); }, 500);
        }

        function setupLogin() {
            const pwdInput = document.getElementById('login-pwd');
            const loginBtn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');

            async function tryLogin() {
                const val = pwdInput.value.trim();
                if (!val) return;
                const hash = await sha256(val);
                if (hash === 'f4cd08638d1bf67e477af7c6bf8162e4023b14523e0e039f67e2cf999574ca00') {
                    unlock();
                } else {
                    errorEl.textContent = '密码不正确';
                    pwdInput.value = '';
                    pwdInput.style.borderColor = '#8a4a4a';
                    loginBtn.style.borderColor = '#8a4a4a';
                    loginBtn.style.color = '#8a4a4a';
                    setTimeout(() => {
                        pwdInput.style.borderColor = '';
                        loginBtn.style.borderColor = '';
                        loginBtn.style.color = '';
                        errorEl.textContent = '';
                    }, 2000);
                }
            }

            loginBtn.addEventListener('click', tryLogin);
            pwdInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') tryLogin();
            });
            pwdInput.focus();
        }

        // ========== Init All ==========
        setupLogin();
        const aplayerScript = document.createElement('script');
        aplayerScript.src = 'https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js';
        aplayerScript.onload = function() {
            window.addEventListener('load', () => {
                initHitokoto();
                initTimeline();
                initMemories();
                initMap();
                initMusic();
                initRevealObserver();
            });
        };
        document.head.appendChild(aplayerScript);
    </script>
</body>
</html>
